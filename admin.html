<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SURF MARINE | 관리자 페이지</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #f4f8fd; padding: 50px 20px; font-family: 'Noto Sans KR', sans-serif; }
        .admin-container { max-width: 600px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        h1 { color: #002b5e; text-align: center; margin-bottom: 30px; }
        
        /* 로그인 폼 */
        #login-section { display: block; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: bold; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; }
        .btn { width: 100%; padding: 15px; background: #002b5e; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; }
        
        /* 대시보드 (일정 관리 폼) */
        #dashboard-section { display: none; }
        .event-form { background: #f8f9fa; padding: 20px; border-radius: 10px; margin-bottom: 30px; }
        .event-list { list-style: none; padding: 0; }
        .event-item { background: #fff; border: 1px solid #eee; padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .btn-delete { background: #d9534f; color: #fff; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .logout-btn { background: #666; margin-top: 30px; }
    </style>
</head>
<body>

    <div class="admin-container">
        <h1><span style="color:#ff6b4a;">서프마린</span> 일정 관리자</h1>

        <!-- 로그인 섹션 -->
        <div id="login-section">
            <div class="input-group">
                <label>이메일</label>
                <input type="email" id="admin-email" placeholder="admin@surfmarine.com">
            </div>
            <div class="input-group">
                <label>비밀번호</label>
                <input type="password" id="admin-pw" placeholder="비밀번호 입력">
            </div>
            <button class="btn" id="login-btn">로그인</button>
        </div>

        <!-- 대시보드 섹션 (로그인 성공 시 표시됨) -->
        <div id="dashboard-section">
            <div class="event-form">
                <h3 style="margin-bottom: 15px;">새 일정 등록</h3>
                <div class="input-group">
                    <label>날짜</label>
                    <input type="date" id="event-date">
                </div>
                <div class="input-group">
                    <label>일정 내용</label>
                    <input type="text" id="event-title" placeholder="예: [정상진행] 선셋 버스킹">
                </div>
                <div class="input-group">
                    <label>색상 (상태)</label>
                    <select id="event-color" style="width: 100%; padding: 12px; border-radius: 8px;">
                        <option value="#002b5e">정상 진행 (남색)</option>
                        <option value="#d9534f">우천 취소 (빨강)</option>
                    </select>
                </div>
                <button class="btn" id="add-event-btn" style="background: #ff6b4a;">일정 추가하기</button>
            </div>

            <h3>등록된 일정 관리</h3>
            <ul class="event-list" id="event-list">
                <!-- 자바스크립트로 일정이 여기에 불러와집니다 -->
            </ul>

            <button class="btn logout-btn" id="logout-btn">로그아웃</button>
        </div>
    </div>

    <!-- Firebase v9 모듈 불러오기 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ★ 여기에 파이어베이스 콘솔에서 발급받은 본인의 config 값을 넣으세요 ★
        const firebaseConfig = {
            apiKey: "AIzaSyCpHsWiagzodYRqXyb67dZSJrLiutTGWvU",
            authDomain: "surfmarine-143fb.firebaseapp.com",
            projectId: "surfmarine-143fb",
            storageBucket: "surfmarine-143fb.firebasestorage.app",
            messagingSenderId: "846325894079",
            appId: "1:846325894079:web:83486c9f1f99f3aef4ef0a",
            measurementId: "G-S4EHTN0B4Z"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // UI 요소
        const loginSection = document.getElementById('login-section');
        const dashboardSection = document.getElementById('dashboard-section');
        const eventListUI = document.getElementById('event-list');

        // 로그인 상태 감지
        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginSection.style.display = 'none';
                dashboardSection.style.display = 'block';
                loadEvents(); // 로그인 성공 시 일정 불러오기
            } else {
                loginSection.style.display = 'block';
                dashboardSection.style.display = 'none';
            }
        });

        // 로그인 버튼 클릭
        document.getElementById('login-btn').addEventListener('click', () => {
            const email = document.getElementById('admin-email').value;
            const pw = document.getElementById('admin-pw').value;
            signInWithEmailAndPassword(auth, email, pw)
                .then(() => alert("로그인 성공!"))
                .catch((error) => alert("로그인 실패: 정보를 확인해주세요."));
        });

        // 로그아웃 버튼 클릭
        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth);
        });

        // 일정 추가 버튼 클릭
        document.getElementById('add-event-btn').addEventListener('click', async () => {
            const date = document.getElementById('event-date').value;
            const title = document.getElementById('event-title').value;
            const color = document.getElementById('event-color').value;

            if(!date || !title) return alert("날짜와 내용을 모두 입력하세요.");

            try {
                await addDoc(collection(db, "busking_events"), {
                    date: date,
                    title: title,
                    color: color
                });
                alert("일정이 등록되었습니다.");
                document.getElementById('event-title').value = '';
                loadEvents(); // 목록 새로고침
            } catch (e) {
                console.error("Error adding document: ", e);
            }
        });

        // 일정 목록 불러오기
        async function loadEvents() {
            eventListUI.innerHTML = '';
            const q = query(collection(db, "busking_events"), orderBy("date", "desc"));
            const querySnapshot = await getDocs(q);
            
            querySnapshot.forEach((documentSnapshot) => {
                const data = documentSnapshot.data();
                const id = documentSnapshot.id;
                
                const li = document.createElement('li');
                li.className = 'event-item';
                li.innerHTML = `
                    <div>
                        <strong>${data.date}</strong> <br> 
                        <span style="color:${data.color}; font-weight:bold;">${data.title}</span>
                    </div>
                    <button class="btn-delete" data-id="${id}">삭제</button>
                `;
                eventListUI.appendChild(li);
            });

            // 삭제 버튼 이벤트 부여
            document.querySelectorAll('.btn-delete').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    if(confirm("정말 이 일정을 삭제하시겠습니까?")) {
                        const id = e.target.getAttribute('data-id');
                        await deleteDoc(doc(db, "busking_events", id));
                        loadEvents();
                    }
                });
            });
        }
    </script>
</body>
</html>
